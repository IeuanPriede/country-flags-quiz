<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ADD KEY WORDS AND WORD SEARCH -->


    <!-- favicon --> <!-- favicon not working on deployment -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">

    <!-- stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Title -->
    <title>Country Flags Quiz</title>
</head>
<body>
    <section id="background-image">
        <div class="container">
            <h1 class="heading">Country Flags Quiz <i class="fa-solid fa-earth-americas"></i></h1>
            <div id="game-area" class="hide">
                <div id="question-area">
                    <!-- Flag images -->
                    <img id="flag" src="" alt="Flag">
                </div>
                <div id="answers" class="answer-area">
                    <h2>Please select the correct answer:</h2>
                </div>
                <div class="score-area">
                    <div id="result">Score: <span id="score">0</span>/10</div>
                </div>
            </div>
            <div class="controls">
                <button id="start-btn" class="start-btn btn">Start</button>
                <button id="next-btn" class="next-btn btn hide">Next</button>
            </div>
        </div>
    </section>

    <script src="assets/js/script.js"></script>
</body>

<!-- font awesome script -->
<script src="https://kit.fontawesome.com/a3fe93833d.js" crossorigin="anonymous"></script>

</html>
