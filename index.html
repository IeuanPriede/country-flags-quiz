<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- favicon --> <!-- favicon not working on deployment -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">

    <!-- stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <title>Country Flags Quiz</title>
</head>
<body>
    <section id="background-image">
        <div class="game-area" id="game-area">
            <h1 class="heading">Country Flags Quiz <i class="fa-solid fa-earth-americas"></i></h1>
            <div class="question-area">
                <img src="assets/images/Flag_of_Latvia.svg.png" alt="Flag of Latvia" id="q1">
            </div>
            <div class="answer-area">
                <h2>Please select the correct answer:</h2>
                <div class="controls-area">
                    <button class="btn btn--big btn--1">Latvia</button>
                    <button class="btn btn--big btn--2">Austria</button>
                    <button class="btn btn--big btn--3">Armenia</button>
                    <button class="btn btn--big btn--4">France</button>
                </div>
            </div>
            <div class="score-area">
                <p1 id="score">Score: <span id="score">0</span>/10</p1>
            </div>
        </div>
    </section>
   

    
    <script src="assets/js/script.js"></script>
</body>
<!-- font awesome script -->
<script src="https://kit.fontawesome.com/a3fe93833d.js" crossorigin="anonymous"></script>
</html>
